services:
  coinrush-web:
    image: ${COINRUSH_IMAGE:-coinrush-web:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.75
    pids_limit: 64
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ALLOWED_ORIGIN: https://game.tinyfat.dev
    ports:
      - "127.0.0.1:${COINRUSH_HTTP_PORT:-3000}:3000/tcp"
    networks:
      - game

networks:
  game:
    driver: bridge
