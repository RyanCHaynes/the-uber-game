<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coin Rush — an authoritative networked castle race for two to ten players.">
  <title>Coin Rush — Multiplayer</title>
</head>
<body>
  <main id="app">
    <canvas id="game-canvas" aria-label="Coin Rush multiplayer game world"></canvas>

    <section id="setup" class="panel screen">
      <a class="mode-back" href="/">← GAME MODES</a>
      <p class="eyebrow">MULTIPLAYER · TINYFAT GAME LAB</p>
      <h1>COIN RUSH</h1>
      <p class="subtitle">An authoritative gothic castle race for 2–10 players.</p>
      <label for="player-name">PLAYER NAME</label>
      <input id="player-name" maxlength="18" value="Player" autocomplete="nickname">
      <button id="join-button" type="button">JOIN LOBBY</button>
      <p class="hint">Move: A/D or arrows · Jump: W or ↑</p>
    </section>

    <section id="lobby" class="panel screen hidden">
      <p class="eyebrow">CASTLE LOBBY</p>
      <h2>READY YOUR CAPE</h2>
      <div id="lobby-players" class="players"></div>
      <button id="ready-button" type="button">READY UP</button>
      <button id="leave-button" class="secondary" type="button">LEAVE</button>
      <p id="notice" class="notice" aria-live="polite"></p>
    </section>

    <section id="hud" class="hidden" aria-live="polite">
      <div id="scores"></div>
      <div class="goal">FIRST TO 5</div>
      <button id="game-leave-button" class="small" type="button">LEAVE</button>
    </section>

    <section id="winner" class="panel winner hidden">
      <h2 id="winner-text">YOU WIN!</h2>
      <p>Returning to the lobby…</p>
    </section>

    <section id="error" class="panel screen hidden">
      <a class="mode-back" href="/">← GAME MODES</a>
      <p class="eyebrow">CONNECTION LOST</p>
      <h2>THE DRAWBRIDGE IS UP</h2>
      <p id="error-text"></p>
      <button id="retry-button" type="button">BACK TO SETUP</button>
    </section>
  </main>
  <script type="module" src="/client/main.js"></script>
</body>
</html>
