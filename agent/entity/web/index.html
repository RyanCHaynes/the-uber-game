<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Entity Workshop</title>
<style>
  :root {
    --bg: #14161c; --panel: #1d2029; --panel2: #232734; --line: #313749;
    --text: #d8dce8; --dim: #8b91a5; --accent: #ffb454; --green: #7bd88f;
    --red: #f07178; --blue: #6fc3ff; --purple: #c792ea;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 system-ui, sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 18px;
           background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  h1 { font-size: 17px; margin: 0; color: var(--accent); }
  .badge { padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.mock { background: #3a3320; color: var(--accent); }
  .badge.llm  { background: #1e3a2a; color: var(--green); }
  .spacer { flex: 1; }
  .muted { color: var(--dim); font-size: 12px; }
  main { display: grid; grid-template-columns: minmax(360px, 1fr) minmax(340px, 1fr);
         gap: 14px; padding: 14px 18px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
           padding: 12px 14px; margin-bottom: 14px; }
  .panel h2 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase;
              letter-spacing: .08em; color: var(--dim); }
  textarea { width: 100%; min-height: 90px; resize: vertical; background: var(--bg);
             color: var(--text); border: 1px solid var(--line); border-radius: 6px;
             padding: 9px 11px; font: 14px/1.5 system-ui, sans-serif; }
  button { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
           border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  button.primary { background: var(--accent); color: #14161c; border: none; font-weight: 700; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  #examples { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px;
          padding: 3px 10px; font-size: 12px; cursor: pointer; color: var(--dim); }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  canvas { width: 100%; background: #0e1015; border-radius: 6px; display: block; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 12px;
            color: var(--dim); }
  pre { margin: 0; font: 12px/1.5 ui-monospace, monospace; white-space: pre-wrap;
        word-break: break-word; background: #0e1015; border-radius: 6px; padding: 10px;
        max-height: 420px; overflow: auto; }
  .find { font: 12px/1.5 ui-monospace, monospace; padding: 4px 8px; border-radius: 4px;
          margin: 3px 0; }
  .find.err { background: #3a2020; color: var(--red); }
  .find.warn { background: #3a3320; color: var(--accent); }
  .find.ok { background: #1e3a2a; color: var(--green); }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px;
          border: 1px solid var(--line); color: var(--dim); margin-left: 6px; }
  #err { color: var(--red); font-weight: 600; }
  .llmEntry { border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px;
              margin-bottom: 8px; font-size: 12px; }
  .llmEntry .h { color: var(--dim); margin-bottom: 4px; }
</style>
</head>
<body>
<header>
  <h1>🛠 Entity Workshop</h1>
  <span id="mode" class="badge mock">…</span>
  <span id="model" class="muted"></span>
  <span class="spacer"></span>
  <span id="tokens" class="muted"></span>
</header>

<main>
  <div>
    <div class="panel">
      <h2>Describe an enemy or boss</h2>
      <textarea id="desc" placeholder="e.g. A fast flying wasp that dive-bombs the player and spits a fan of stingers"></textarea>
      <div id="examples"></div>
      <div class="row">
        <button id="gen" class="primary">Generate</button>
        <span id="status" class="muted"></span>
        <span id="err"></span>
      </div>
    </div>

    <div class="panel">
      <h2>Arena</h2>
      <div class="row" style="margin-top:0; margin-bottom:8px">
        <button id="sim" class="primary" disabled>▶ Simulate</button>
        <button id="simStop" disabled>■ Stop</button>
        <span id="simStatus" class="muted">Generate an entity, then Simulate.</span>
      </div>
      <canvas id="cv" width="768" height="416" tabindex="0"></canvas>
      <div class="legend">
        <span>← → / A·D move</span><span>↑ / W / space jump</span>
        <span>click to fire</span><span>R restart</span>
      </div>
      <div id="simHud" class="muted" style="margin-top:6px; font-family:ui-monospace,monospace"></div>
    </div>
  </div>

  <div>
    <div class="panel">
      <h2>Validation</h2>
      <div id="validation"><span class="muted">No entity generated yet.</span></div>
    </div>
    <div class="panel">
      <h2>EntitySpec JSON</h2>
      <pre id="json">—</pre>
    </div>
    <div class="panel">
      <h2>Recent LLM traffic</h2>
      <div id="llm"><span class="muted">—</span></div>
    </div>
  </div>
</main>

<script>
const EXAMPLES = [
  "A slow ground turret that fires aimed shots in bursts",
  "A fast flying wasp that dive-bombs and spits a fan of stingers",
  "A mechanical moth boss with two destructible wings that launch homing missiles, then crashes and rages when both wings are gone",
  "A patrolling armored beetle with high health and heavy contact damage",
];

let lastSpec = null;

function el(id) { return document.getElementById(id); }

function setStatus(text, busy) {
  el("status").textContent = text || "";
  el("gen").disabled = !!busy;
}

async function refreshStatus() {
  try {
    const s = await (await fetch("/api/status")).json();
    const badge = el("mode");
    badge.className = "badge " + (s.mode === "mock" ? "mock" : "llm");
    badge.textContent = s.mode === "mock" ? "MOCK (no API key)" : "NEMOTRON";
    el("model").textContent = s.model || "";
    if (s.tokens) el("tokens").textContent =
      `tokens: ${s.tokens.used.toLocaleString()} / ${s.tokens.budget.toLocaleString()}`;
    renderLlm(s.llm_log || []);
  } catch (e) { /* server may be starting */ }
}

function renderLlm(log) {
  if (!log.length) { el("llm").innerHTML = '<span class="muted">No calls yet.</span>'; return; }
  el("llm").innerHTML = log.slice(-6).reverse().map(e => `
    <div class="llmEntry">
      <div class="h">${e.ts || ""} · ${e.label || ""} · ${e.duration_s ?? "?"}s ·
        in ${e.input_tokens || 0} / out ${e.output_tokens || 0}</div>
    </div>`).join("");
}

function findingRow(cls, text) {
  const d = document.createElement("div");
  d.className = "find " + cls;
  d.textContent = text;
  return d;
}

function renderValidation(v, error) {
  const box = el("validation");
  box.innerHTML = "";
  if (error) box.appendChild(findingRow("err", "⚠ " + error));
  if (!v) {
    if (!error) box.innerHTML = '<span class="muted">No validation.</span>';
    return;
  }
  if (v.ok && !v.warnings.length)
    box.appendChild(findingRow("ok", "✓ Valid — passes schema and reference checks"));
  else if (v.ok)
    box.appendChild(findingRow("ok", "✓ Valid (with warnings)"));
  v.errors.forEach(e => box.appendChild(findingRow("err", "✗ " + e)));
  v.warnings.forEach(w => box.appendChild(findingRow("warn", "! " + w)));
}

// --- static structural preview ---------------------------------------------
function collectParts(spec) {
  // Returns [{id, hp, at:[x,y], size:[w,h], shape, tint, isRoot, emitters:[{at,ref}]}]
  const parts = [];
  const root = spec && spec.root;
  if (!root) return parts;
  function emittersOf(node) {
    const out = [];
    if (node.emitters) for (const [name, em] of Object.entries(node.emitters))
      out.push({ name, at: em.at || [0, 0], ref: em.ref });
    return out;
  }
  function sizeOf(node) {
    const v = node.visual || {}, b = node.body || {};
    if (v.size) return v.size;
    if (b.size) return b.size;
    if (b.radius) return [b.radius * 2, b.radius * 2];
    return [1, 1];
  }
  function hpOf(node) { return node.health && node.health.max; }
  const rootAt = [0, 0];
  parts.push({ id: root.id || "root", hp: hpOf(root), at: rootAt, size: sizeOf(root),
    shape: (root.visual && root.visual.shape) || "box",
    tint: (root.visual && root.visual.tint), isRoot: true, emitters: emittersOf(root) });
  (root.children || []).forEach(c => {
    const at = c.at || [0, 0];
    parts.push({ id: c.id || "part", hp: hpOf(c), at, size: sizeOf(c),
      shape: (c.visual && c.visual.shape) || "box",
      tint: (c.visual && c.visual.tint), isRoot: false, emitters: emittersOf(c) });
  });
  return parts;
}

function drawShape(ctx, shape, x, y, w, h) {
  ctx.beginPath();
  if (shape === "circle" || shape === "ellipse") {
    ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
  } else if (shape === "diamond") {
    ctx.moveTo(x, y - h / 2); ctx.lineTo(x + w / 2, y);
    ctx.lineTo(x, y + h / 2); ctx.lineTo(x - w / 2, y); ctx.closePath();
  } else if (shape === "triangle") {
    ctx.moveTo(x, y - h / 2); ctx.lineTo(x + w / 2, y + h / 2);
    ctx.lineTo(x - w / 2, y + h / 2); ctx.closePath();
  } else { // box, capsule, fallback
    ctx.rect(x - w / 2, y - h / 2, w, h);
  }
}

function renderPreview(spec) {
  const cv = el("cv"), ctx = cv.getContext("2d");
  ctx.clearRect(0, 0, cv.width, cv.height);
  const parts = collectParts(spec);
  if (!parts.length) return;

  // world bounds from part extents
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  parts.forEach(p => {
    minX = Math.min(minX, p.at[0] - p.size[0] / 2);
    maxX = Math.max(maxX, p.at[0] + p.size[0] / 2);
    minY = Math.min(minY, p.at[1] - p.size[1] / 2);
    maxY = Math.max(maxY, p.at[1] + p.size[1] / 2);
  });
  const pad = 1.2;
  const worldW = (maxX - minX) + pad * 2, worldH = (maxY - minY) + pad * 2;
  const scale = Math.min(cv.width / worldW, cv.height / worldH) * 0.9;
  const cx = cv.width / 2, cy = cv.height / 2;
  const midX = (minX + maxX) / 2, midY = (minY + maxY) / 2;
  const toX = wx => cx + (wx - midX) * scale;
  const toY = wy => cy + (wy - midY) * scale;

  parts.forEach(p => {
    const px = toX(p.at[0]), py = toY(p.at[1]);
    const pw = p.size[0] * scale, ph = p.size[1] * scale;
    drawShape(ctx, p.shape, px, py, pw, ph);
    ctx.fillStyle = p.tint || (p.isRoot ? "#c792ea" : "#7bd88f");
    ctx.globalAlpha = 0.85; ctx.fill(); ctx.globalAlpha = 1;
    ctx.lineWidth = p.isRoot ? 2 : 1;
    ctx.strokeStyle = "#0e1015"; ctx.stroke();
    // label
    ctx.fillStyle = "#d8dce8";
    ctx.font = "12px ui-monospace, monospace";
    ctx.textAlign = "center";
    const label = p.id + (p.hp != null ? ` · ${p.hp}hp` : "");
    ctx.fillText(label, px, py - ph / 2 - 5);
    // emitters
    p.emitters.forEach(em => {
      const ex = toX(p.at[0] + em.at[0]), ey = toY(p.at[1] + em.at[1]);
      ctx.beginPath();
      ctx.moveTo(ex, ey - 5); ctx.lineTo(ex + 5, ey);
      ctx.lineTo(ex, ey + 5); ctx.lineTo(ex - 5, ey); ctx.closePath();
      ctx.fillStyle = "#f07178"; ctx.fill();
      if (em.ref) {
        ctx.fillStyle = "#8b91a5"; ctx.font = "10px ui-monospace, monospace";
        ctx.fillText("→" + em.ref, ex, ey + 16);
      }
    });
  });
}

async function generate() {
  const description = el("desc").value.trim();
  el("err").textContent = "";
  if (!description) { el("err").textContent = "Enter a description first."; return; }
  setStatus("Generating…", true);
  try {
    const res = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ description }),
    });
    const data = await res.json();
    if (res.status === 409) { el("err").textContent = data.error; setStatus("", false); return; }
    lastSpec = data.spec;
    el("json").textContent = data.spec ? JSON.stringify(data.spec, null, 2) : "—";
    renderValidation(data.validation, data.error);
    SIM.stop();
    renderPreview(data.spec);
    const playable = !!(data.spec && data.validation && data.validation.ok);
    el("sim").disabled = !playable;
    el("simStatus").textContent = playable
      ? "Ready — click ▶ Simulate (then click the arena to control)."
      : "Fix validation errors before simulating.";
    const bits = [];
    if (data.mode) bits.push(data.mode);
    if (data.attempts) bits.push(`${data.attempts} attempt(s)`);
    setStatus(bits.join(" · "), false);
    refreshStatus();
  } catch (e) {
    el("err").textContent = "Request failed: " + e;
    setStatus("", false);
  }
}

el("gen").addEventListener("click", generate);
el("desc").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") generate();
});
el("examples").innerHTML = EXAMPLES.map((x, i) =>
  `<span class="chip" data-i="${i}">${x.length > 42 ? x.slice(0, 42) + "…" : x}</span>`).join("");
el("examples").querySelectorAll(".chip").forEach(c =>
  c.addEventListener("click", () => { el("desc").value = EXAMPLES[+c.dataset.i]; }));

// ===========================================================================
//  LIVE SIMULATION — a fixed arena, a player (move/jump/fire matching the main
//  game), and the generated entity fighting back with its full spec behaviors:
//  motion controllers, brain states with parallel tracks, emitters/patterns,
//  events/signals, and an expression evaluator for transitions.
// ===========================================================================
const SIM = (() => {
  const cv = el("cv"), ctx = cv.getContext("2d");
  const TILE = 32, COLS = 24, ROWS = 13;
  const W = COLS * TILE, H = ROWS * TILE;

  // --- fixed arena: border walls, ground floor, two platforms --------------
  const grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const border = c === 0 || c === COLS - 1 || r === ROWS - 1;
      grid[r][c] = border ? "X" : " ";
    }
  }
  for (let c = 5; c <= 9; c++) grid[8][c] = "X";
  for (let c = 14; c <= 18; c++) grid[8][c] = "X";
  const isSolid = (c, r) => c < 0 || c >= COLS ? true : r < 0 || r >= ROWS ? false : grid[r][c] === "X";

  // --- player (constants lifted from the main game) ------------------------
  const P_SPEED = 3.2, P_JUMP = 9.6, P_GRAV = 0.5, P_MAXFALL = 12;
  const SHOT_SPEED = 10, SHOT_G = 0.35, SHOT_LOFT = 1.5, SHOT_CD = 320, SHOT_DMG = 15;
  const PLAYER_HP = 3, GRAV_WORLD = 18 * TILE;  // px/s^2 for gravity-bound entities

  let player, keys = {}, mouse = { x: 0, y: 0 }, lastShotAt = 0;
  let ents = [], defs = {}, pShots = [], signals = new Set();
  let arenaTime = 0, deaths = 0, result = null;
  let running = false, rafId = 0, lastT = 0, acc = 0;

  const rootEnt = () => ents.find(e => e.isRoot);
  const playerCX = () => player.x + player.w / 2;
  const playerCY = () => player.y + player.h / 2;
  const vec = (a, s) => [a[0] * s, a[1] * s];
  const distToPlayer = e => Math.hypot(playerCX() - e.x, playerCY() - e.y) / TILE;  // tiles
  const NEAR_TILES = 5, FAR_TILES = 8;

  function nodeSize(node) {
    const v = node.visual || {}, b = node.body || {};
    if (Array.isArray(v.size)) return v.size;
    if (Array.isArray(b.size)) return b.size;
    if (b.radius) return [b.radius * 2, b.radius * 2];
    return [1, 1];
  }

  function mkEntity(node, parent, isRoot) {
    const size = nodeSize(node);
    return {
      id: node.id || "e", spec: node, tags: node.tags || [],
      parent, isRoot: !!isRoot, detached: false, isProjectile: false,
      atOffset: vec(node.at || [0, 0], TILE),
      x: 0, y: 0, vx: 0, vy: 0,
      w: Math.max(6, size[0] * TILE), h: Math.max(6, size[1] * TILE),
      shape: (node.visual && node.visual.shape) || (node.body && node.body.shape) || "box",
      tint: (node.visual && node.visual.tint) || (isRoot ? "#c792ea" : "#7bd88f"),
      gravityOn: node.body ? !!node.body.gravity : false,
      hpMax: node.health && node.health.max, hp: node.health && node.health.max,
      contact: node.contact || null, emitters: node.emitters || {},
      on: node.on || {}, vars: Object.assign({}, node.vars || {}),
      ttl: node.life && node.life.ttl, age: 0,
      motion: node.motion ? Object.assign({}, node.motion) : null,
      alive: true, telegraphUntil: 0, autoFireAt: 0,
      moveTarget: null, dashUntil: 0, children: [], brain: null,
    };
  }

  // --- instantiate a spec into live entities -------------------------------
  function instantiate(spec) {
    ents = []; defs = spec.defs || {}; pShots = []; signals.clear();
    arenaTime = 0; deaths = 0; result = null;
    const root = mkEntity(spec.root, null, true);
    // Flyers start in the air; ground enemies start on the floor (gravity settles
    // them there anyway, but spawning in place avoids a drop-in from the ceiling).
    root.x = W * 0.62;
    root.y = root.gravityOn ? H - TILE - root.h / 2 - 1 : H * 0.32;
    ents.push(root);
    for (const cn of spec.root.children || []) {
      const c = mkEntity(cn, root, false);
      c.x = root.x + c.atOffset[0]; c.y = root.y + c.atOffset[1];
      root.children.push(c); ents.push(c);
    }
    if (spec.brain && spec.brain.states) {
      root.brain = { states: spec.brain.states, cur: null, tracks: [] };
      enterState(root, spec.brain.start);
    }
  }

  function resolveDef(ref) {
    if (defs[ref]) return Object.assign({ id: ref }, defs[ref]);
    const e = ents.find(x => x.id === ref);
    return e ? e.spec : null;
  }

  // --- expression evaluator (safe: tokenizer + Pratt parser) ---------------
  function evalExpr(src, self) {
    try { return !!ev(parse(tokenize(String(src))), self); }
    catch (e) { return false; }
  }
  function tokenize(s) {
    const out = [], re = /\s*([0-9]*\.?[0-9]+|'[^']*'|[A-Za-z_][\w.]*|<=|>=|==|!=|&&|\|\||[()<>!*/+\-,])/g;
    let m; while ((m = re.exec(s))) out.push(m[1]);
    return out;
  }
  function parse(tk) {
    let i = 0;
    const peek = () => tk[i], next = () => tk[i++];
    const BIN = { "||": 1, "&&": 2, "==": 3, "!=": 3, "<": 4, ">": 4, "<=": 4, ">=": 4, "+": 5, "-": 5, "*": 6, "/": 6 };
    function prim() {
      const t = next();
      if (t === "(") { const e = expr(0); next(); return e; }
      if (t === "!") return { op: "!", a: prim() };
      if (t === "-") return { op: "neg", a: prim() };
      if (/^'.*'$/.test(t)) return { str: t.slice(1, -1) };
      if (/^[0-9.]+$/.test(t)) return { num: parseFloat(t) };
      if (peek() === "(") {   // function call
        next(); const args = [];
        if (peek() !== ")") { args.push(expr(0)); while (peek() === ",") { next(); args.push(expr(0)); } }
        next(); return { fn: t, args };
      }
      return { id: t };
    }
    function expr(min) {
      let left = prim();
      while (peek() && BIN[peek()] >= min && BIN[peek()]) {
        const op = next(); const right = expr(BIN[op] + 1);
        left = { op, a: left, b: right };
      }
      return left;
    }
    return expr(0);
  }
  function ev(n, self) {
    if ("num" in n) return n.num;
    if ("str" in n) return n.str;
    if (n.id !== undefined) return resolvePath(n.id, self);
    if (n.fn !== undefined) return callFn(n.fn, n.args.map(a => ev(a, self)), self);
    if (n.op === "!") return !ev(n.a, self);
    if (n.op === "neg") return -ev(n.a, self);
    const a = ev(n.a, self), b = ev(n.b, self);
    switch (n.op) {
      case "&&": return a && b; case "||": return a || b;
      case "==": return a == b; case "!=": return a != b;
      case "<": return a < b; case ">": return a > b;
      case "<=": return a <= b; case ">=": return a >= b;
      case "+": return a + b; case "-": return a - b;
      case "*": return a * b; case "/": return a / b;
    }
  }
  function resolvePath(path, self) {
    const parts = path.split(".");
    if (path === "true") return true;
    if (path === "false") return false;
    // sensor shorthands usable directly in transition `when` expressions
    if (path === "timer") return self && self.brain ? arenaTime - (self.brain.stateSince || 0) : arenaTime;
    if (path === "playerNear") return self ? distToPlayer(self) < NEAR_TILES : false;
    if (path === "playerFar") return self ? distToPlayer(self) > FAR_TILES : false;
    if (path === "playerAbove") return self ? playerCY() < self.y - TILE : false;
    if (path === "playerBelow") return self ? playerCY() > self.y + TILE : false;
    let base;
    if (parts[0] === "self") base = self;
    else if (parts[0] === "root") base = rootEnt();
    else if (parts[0] === "player") base = { hp: player.hp, isGrounded: player.grounded, x: playerCX(), y: playerCY(), velocity: { x: player.vx, y: player.vy } };
    else if (parts[0] === "arena") base = { time: arenaTime };
    else return 0;
    let v = base;
    for (let k = 1; k < parts.length; k++) {
      if (parts[k] === "hpPct" && v && v.hpMax) { v = v.hp / v.hpMax; continue; }
      v = v ? v[parts[k]] : undefined;
    }
    return v == null ? 0 : v;
  }
  function callFn(name, a, self) {
    const sel = a[0];

    instantiate(spec);
    running = true; lastT = performance.now(); acc = 0;
    el("sim").disabled = true; el("simStop").disabled = false;
    el("simStatus").textContent = "Running — click the arena, then move/jump/fire.";
    cv.focus(); rafId = requestAnimationFrame(frame);
  }
  function stop() {
    running = false; cancelAnimationFrame(rafId);
    el("simStop").disabled = true;
    el("sim").disabled = !(lastSpec && document.getElementById("json").textContent !== "—");
    if (lastSpec) { renderPreview(lastSpec); el("simStatus").textContent = "Stopped — showing structure. ▶ Simulate to run again."; }
    el("simHud").textContent = "";
  }

  // --- input ---------------------------------------------------------------
  cv.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyR"].includes(e.code)) e.preventDefault();
    if (e.code === "KeyR" && running) start(lastSpec);
  });
  window.addEventListener("keyup", e => { keys[e.code] = false; });
  cv.addEventListener("blur", () => { keys = {}; });
  cv.addEventListener("click", () => cv.focus());
  cv.addEventListener("mousemove", e => {
    const rect = cv.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (cv.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (cv.height / rect.height);
  });
  cv.addEventListener("mousedown", e => {
    cv.focus();
    if (e.button !== 0 || !running || result) return;
    const now = performance.now();
    if (now - lastShotAt < SHOT_CD) return;
    lastShotAt = now;
    const px = playerCX(), py = playerCY(), dx = mouse.x - px, dy = mouse.y - py, d = Math.hypot(dx, dy) || 1;
    pShots.push({ x: px, y: py, vx: dx / d * SHOT_SPEED, vy: dy / d * SHOT_SPEED - SHOT_LOFT, dead: false });
  });

  return { start, stop };
})();

el("sim").addEventListener("click", () => SIM.start(lastSpec));
el("simStop").addEventListener("click", () => SIM.stop());

refreshStatus();
setInterval(refreshStatus, 4000);
</script>
</body>
